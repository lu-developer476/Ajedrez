services:
  - type: web
    name: cyborg-chess-edition
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn cyborg_chess.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "cyborg-chess-edition.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://cyborg-chess-edition.onrender.com"
      - key: DATABASE_URL
        sync: false
